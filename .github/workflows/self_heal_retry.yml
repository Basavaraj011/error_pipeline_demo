name: Self Heal Retry

on:
  workflow_run:
    workflows:
      - Validate Auto-Fix PR
    types:
      - completed

env:
  MAX_RETRIES: 3
  AWS_REGION: us-east-1

permissions:
  id-token: write      # Required for OIDC
  contents: read
  pull-requests: read
  actions: read

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure'

    runs-on: ubuntu-latest

    steps:
      - name: Extract PR Details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} \
            --jq '.pull_requests[0].number')

          TITLE=$(gh api \
            repos/${{ github.repository }}/pulls/$PR_NUMBER \
            --jq '.title')

          ERROR_ID=$(echo "$TITLE" | grep -oP '\[E_ID:\s*\K\d+(?=\])')

          if [ -z "$ERROR_ID" ]; then
            echo "Failed to extract ERROR_ID from title: $TITLE"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "error_id=$ERROR_ID" >> "$GITHUB_OUTPUT"

          echo "PR_NUMBER=$PR_NUMBER"
          echo "TITLE=$TITLE"
          echo "ERROR_ID=$ERROR_ID"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Retry Lambda
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "error_id": "${{ steps.pr.outputs.error_id }}",
            "pr_number": "${{ steps.pr.outputs.pr_number }}",
            "branch": "${{ github.event.workflow_run.head_branch }}",
            "retry_limit": "${{ env.MAX_RETRIES }}",
            "workflow_run_id": "${{ github.event.workflow_run.id }}"
          }
          EOF
          )

          echo "Payload:"
          echo "$PAYLOAD"

          aws lambda invoke \
            --function-name post-pr-actions-trigger \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            response.json

          echo "Lambda Response:"
          cat response.json
