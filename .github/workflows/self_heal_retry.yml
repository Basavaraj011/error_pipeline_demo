name: Self Heal Retry

on:
  workflow_run:
    workflows:
      - Validate Auto-Fix PR
    types:
      - completed

env:
  MAX_RETRIES: 3
  AWS_REGION: us-east-1

permissions:
  id-token: write      # Required for OIDC
  contents: read
  pull-requests: read
  actions: read

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure'

    runs-on: ubuntu-latest

    steps:
      - name: Extract PR Details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} \
            --jq '.pull_requests[0].number')

          TITLE=$(gh api \
            repos/${{ github.repository }}/pulls/$PR_NUMBER \
            --jq '.title')

          ERROR_ID=$(echo "$TITLE" | grep -oP '\[E_ID:\s*\K\d+(?=\])')

          if [ -z "$ERROR_ID" ]; then
            echo "Failed to extract ERROR_ID from title: $TITLE"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "error_id=$ERROR_ID" >> "$GITHUB_OUTPUT"

          echo "PR_NUMBER=$PR_NUMBER"
          echo "TITLE=$TITLE"
          echo "ERROR_ID=$ERROR_ID"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download PR Patch
        id: patch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr_number }} \
            -H "Accept: application/vnd.github.v3.diff" \
            > pr.patch
      
          {
            echo "pr_patch<<EOF"
            tail -500 pr.patch
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
      - name: Get Validation Artifact
        id: artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
            --jq '.artifacts[] | select(.name=="validation-logs") | .id')
      
          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT

      - name: Download Validation Logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/actions/artifacts/${{ steps.artifact.outputs.artifact_id }}/zip \
            > validation-logs.zip
      
          unzip validation-logs.zip -d logs
      
          ls -R logs

      - name: Read Validation Log
        id: log
        run: |
          {
            echo "validation_log<<EOF"
            tail -500 logs/validation.log
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Payload
        run: |
          jq -n \
            --arg error_id "${{ steps.pr.outputs.error_id }}" \
            --arg pr_number "${{ steps.pr.outputs.pr_number }}" \
            --arg branch "${{ github.event.workflow_run.head_branch }}" \
            --arg workflow_run_id "${{ github.event.workflow_run.id }}" \
            --arg ci_failure_reason "${{ steps.log.outputs.validation_log }}" \
            --arg previous_patch "${{ steps.patch.outputs.pr_patch }}" \
            '{
              retry: true,
              error_id: $error_id,
              pr_number: $pr_number,
              branch: $branch,
              workflow_run_id: $workflow_run_id,
              ci_failure_reason: $ci_failure_reason,
              previous_patch: $previous_patch
            }' > payload.json
      
          cat payload.json
          

      - name: Invoke Retry Lambda
        run: |
          aws lambda invoke \
            --function-name post-pr-actions-trigger \
            --payload file://payload.json \
            --cli-binary-format raw-in-base64-out \
            response.json
      
          cat response.json
