name: Validate Auto-Fix PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  validate-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python Files
        run: |
          python -m compileall src > validation.log 2>&1

      - name: Run Pipeline
        run: |
          python src/main.py >> validation.log 2>&1

      - name: Upload Validation Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: validation.log
