name: Validate Auto-Fix PR

on:
  pull_request:
    types:
      - opened

jobs:
  validate-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute application
        run: |
          python main.py
