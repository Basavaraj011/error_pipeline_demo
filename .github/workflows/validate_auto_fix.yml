name: Self Heal Retry

on:
  workflow_run:
    workflows:
      - Validate Auto-Fix PR
    types:
      - completed

env:
  MAX_RETRIES: 3

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure'

    runs-on: ubuntu-latest

    steps:
      - name: Get PR Details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} \
            --jq '.pull_requests[0].number')

          TITLE=$(gh pr view $PR_NUMBER --json title --jq '.title')

          ERROR_ID=$(echo "$TITLE" | grep -oP '\[E_ID:\s*\K\d+(?=\])')

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "error_id=$ERROR_ID" >> $GITHUB_OUTPUT

          echo "PR_NUMBER=$PR_NUMBER"
          echo "ERROR_ID=$ERROR_ID"

      - name: Invoke Self-Heal Retry
        run: |
          cat > payload.json <<EOF
          {
            "error_id": "${{ steps.pr.outputs.error_id }}",
            "pr_number": "${{ steps.pr.outputs.pr_number }}",
            "retry_limit": "${{ env.MAX_RETRIES }}"
          }
          EOF

          cat payload.json

          curl -X POST "$LAMBDA_ENDPOINT" \
            -H "Content-Type: application/json" \
            -d @payload.json
